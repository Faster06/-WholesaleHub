<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WholesaleHub</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin: 0 0 10px 0;
        }

        .login-header p {
            color: #7f8c8d;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 5px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-group input::placeholder {
            color: #bdc3c7;
        }

        .form-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .form-toggle {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        .form-toggle a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .form-toggle a:hover {
            text-decoration: underline;
        }

        .demo-info {
            background-color: #ecf0f1;
            border-left: 4px solid #3498db;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 3px;
            font-size: 0.9rem;
            color: #2c3e50;
        }

        .demo-info strong {
            color: #2c3e50;
        }

        .demo-info code {
            background-color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #e74c3c;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .success-message {
            background-color: #d5f4e6;
            border-left: 4px solid #27ae60;
            color: #27ae60;
            padding: 15px;
            border-radius: 3px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle .toggle-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #7f8c8d;
            user-select: none;
        }

        .password-toggle input {
            padding-right: 40px;
        }

        @media (max-width: 600px) {
            .login-box {
                padding: 25px;
                max-width: 100%;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .demo-info {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>📦 WholesaleHub</h1>
                <p id="headerSubtitle">Sign in to your account</p>
            </div>

            <!-- Demo Info -->
            <div class="demo-info">
                <strong>Demo Accounts:</strong><br>
                👤 Username: <code>admin</code> | 🔑 Password: <code>admin123</code><br>
                👤 Username: <code>demo</code> | 🔑 Password: <code>demo123</code>
            </div>

            <!-- Success Message -->
            <div class="success-message" id="successMessage"></div>

            <!-- Login Form -->
            <form id="loginForm" class="form-container active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input 
                        type="text" 
                        id="loginUsername" 
                        name="username" 
                        placeholder="Enter your username"
                        autocomplete="username"
                    >
                    <div class="form-error" id="loginUsernameError"></div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-toggle">
                        <input 
                            type="password" 
                            id="loginPassword" 
                            name="password" 
                            placeholder="Enter your password"
                            autocomplete="current-password"
                        >
                        <span class="toggle-icon" onclick="togglePasswordVisibility('loginPassword')">👁️</span>
                    </div>
                    <div class="form-error" id="loginPasswordError"></div>
                </div>

                <button type="submit" class="submit-btn" id="loginSubmitBtn">Login</button>

                <div class="form-toggle">
                    Don't have an account? 
                    <a onclick="toggleForms()">Register here</a>
                </div>
            </form>

            <!-- Registration Form -->
            <form id="registerForm" class="form-container" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="registerName">Full Name</label>
                    <input 
                        type="text" 
                        id="registerName" 
                        name="name" 
                        placeholder="Enter your full name"
                    >
                    <div class="form-error" id="registerNameError"></div>
                </div>

                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input 
                        type="text" 
                        id="registerUsername" 
                        name="username" 
                        placeholder="Choose a username (3+ characters)"
                        autocomplete="username"
                    >
                    <div class="form-error" id="registerUsernameError"></div>
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input 
                        type="email" 
                        id="registerEmail" 
                        name="email" 
                        placeholder="Enter your email address"
                        autocomplete="email"
                    >
                    <div class="form-error" id="registerEmailError"></div>
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <div class="password-toggle">
                        <input 
                            type="password" 
                            id="registerPassword" 
                            name="password" 
                            placeholder="Create a password (6+ characters)"
                            autocomplete="new-password"
                        >
                        <span class="toggle-icon" onclick="togglePasswordVisibility('registerPassword')">👁️</span>
                    </div>
                    <div class="form-error" id="registerPasswordError"></div>
                </div>

                <div class="form-group">
                    <label for="registerConfirmPassword">Confirm Password</label>
                    <div class="password-toggle">
                        <input 
                            type="password" 
                            id="registerConfirmPassword" 
                            name="confirmPassword" 
                            placeholder="Confirm your password"
                            autocomplete="new-password"
                        >
                        <span class="toggle-icon" onclick="togglePasswordVisibility('registerConfirmPassword')">👁️</span>
                    </div>
                    <div class="form-error" id="registerConfirmPasswordError"></div>
                </div>

                <button type="submit" class="submit-btn" id="registerSubmitBtn">Create Account</button>

                <div class="form-toggle">
                    Already have an account? 
                    <a onclick="toggleForms()">Login here</a>
                </div>
            </form>

            <div class="back-link">
                <a href="index.html">← Back to Marketplace</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="JS/auth.js"></script>
    <script src="JS/main.js"></script>
    <script>
        // Toggle between login and register forms
        function toggleForms() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const headerSubtitle = document.getElementById('headerSubtitle');

            loginForm.classList.toggle('active');
            registerForm.classList.toggle('active');

            // Update header
            if (loginForm.classList.contains('active')) {
                headerSubtitle.textContent = 'Sign in to your account';
            } else {
                headerSubtitle.textContent = 'Create a new account';
            }

            // Clear errors and messages
            clearAllErrors();
            clearSuccessMessage();
        }

        // Handle login form submission
        function handleLogin(event) {
            event.preventDefault();
            clearAllErrors();
            clearSuccessMessage();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const submitBtn = document.getElementById('loginSubmitBtn');

            let isValid = true;

            // Validation
            if (!username) {
                showError('loginUsernameError', 'Username is required');
                isValid = false;
            }

            if (!password) {
                showError('loginPasswordError', 'Password is required');
                isValid = false;
            }

            if (!isValid) return;

            // Show loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            // Simulate network delay
            setTimeout(() => {
                const result = loginUser(username, password);

                if (result.success) {
                    showSuccessMessage('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError('loginPasswordError', result.error);
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login';
                }
            }, 500);
        }

        // Handle registration form submission
        function handleRegister(event) {
            event.preventDefault();
            clearAllErrors();
            clearSuccessMessage();

            const name = document.getElementById('registerName').value.trim();
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const submitBtn = document.getElementById('registerSubmitBtn');

            let isValid = true;

            // Validation
            if (!name) {
                showError('registerNameError', 'Full name is required');
                isValid = false;
            }

            if (!username) {
                showError('registerUsernameError', 'Username is required');
                isValid = false;
            } else if (username.length < 3) {
                showError('registerUsernameError', 'Username must be at least 3 characters');
                isValid = false;
            }

            if (!email) {
                showError('registerEmailError', 'Email is required');
                isValid = false;
            }

            if (!password) {
                showError('registerPasswordError', 'Password is required');
                isValid = false;
            } else if (password.length < 6) {
                showError('registerPasswordError', 'Password must be at least 6 characters');
                isValid = false;
            }

            if (!confirmPassword) {
                showError('registerConfirmPasswordError', 'Please confirm your password');
                isValid = false;
            } else if (password !== confirmPassword) {
                showError('registerConfirmPasswordError', 'Passwords do not match');
                isValid = false;
            }

            if (!isValid) return;

            // Show loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            // Simulate network delay
            setTimeout(() => {
                const result = registerUser(username, email, password, name);

                if (result.success) {
                    showSuccessMessage(result.message);
                    document.getElementById('registerForm').reset();
                    
                    // Switch to login after 2 seconds
                    setTimeout(() => {
                        clearSuccessMessage();
                        toggleForms();
                        document.getElementById('loginUsername').value = username;
                        document.getElementById('loginPassword').focus();
                    }, 2000);
                } else {
                    showError('registerConfirmPasswordError', result.error);
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            }, 500);
        }

        // Show error message
        function showError(errorId, message) {
            const errorElement = document.getElementById(errorId);
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.classList.add('show');
            }
        }

        // Clear all error messages
        function clearAllErrors() {
            document.querySelectorAll('.form-error').forEach(error => {
                error.textContent = '';
                error.classList.remove('show');
            });
        }

        // Show success message
        function showSuccessMessage(message) {
            const successElement = document.getElementById('successMessage');
            successElement.textContent = '✅ ' + message;
            successElement.classList.add('show');
        }

        // Clear success message
        function clearSuccessMessage() {
            const successElement = document.getElementById('successMessage');
            successElement.textContent = '';
            successElement.classList.remove('show');
        }

        // Toggle password visibility
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const icon = event.target;
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        // Auto-redirect if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            if (isLoggedIn()) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
